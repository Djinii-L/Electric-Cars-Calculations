kind = "web"
previewPath = "/"
title = "Lithium Tracker"
version = "1.0.0"
id = "artifacts/lithium-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22020
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/lithium-tracker run dev"

[services.env]
PORT = "22020"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/lithium-tracker", "run", "build"]
publicDir = "artifacts/lithium-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
